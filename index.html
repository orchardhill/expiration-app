<body>
    <div class="app-header">Expiration Inventory</div>
    
    <div class="container">
        <!-- Scan Section -->
        <div class="card">
            <h3>Scan Label (Auto-Fill)</h3>
            <input type="file" id="photoInput" accept="image/*" capture="environment" />
            <button type="button" class="primary-btn" id="scanBtn">📷 Scan Label (Auto-Fill)</button>
            <button type="button" class="primary-btn barcode-btn" id="barcodeBtn" style="background:#607d8b; margin-top:10px;">🔍 Scan Barcode</button>
            
            <video id="barcodeVideo" style="width:100%; display:none; margin-top:10px;"></video>
            <img id="imagePreview" class="preview" style="width:100%; display:none; margin-top:10px;" />
            
            <div class="progress-container">
                <div class="progress-bar" id="ocrProgress"></div>
            </div>
            <div id="ocrStatus" style="margin-top:10px;"></div>
        </div>

        <!-- THIS WAS THE MISSING PART: Confirm Section -->
        <div id="confirmCard" class="card hidden">
            <h3>Confirm Details</h3>
            <form id="itemForm">
                <label>Item Name</label>
                <input type="text" name="itemName" id="itemName" required />

                <div style="display: flex; gap: 10px;">
                    <div style="flex: 1;">
                        <label>Qty</label>
                        <input type="number" name="quantity" id="quantity" step="0.1" />
                    </div>
                    <div style="flex: 1;">
                        <label>Unit</label>
                        <input type="text" name="unit" id="unit" placeholder="oz, lb, ct" />
                    </div>
                </div>

                <label>Expiration Date</label>
                <input type="date" name="expirationDate" id="expirationDate" required />

                <label>Location</label>
                <select name="location" id="location">
                    <option value="Pantry">Pantry</option>
                    <option value="Fridge">Fridge</option>
                    <option value="Freezer">Freezer</option>
                </select>

                <label>Assigned To</label>
                <input type="text" name="assignedTo" id="assignedTo" />

                <button type="submit" class="primary-btn" style="background: #3c8f4f; margin-top:20px;">✅ Save to Sheet</button>
            </form>
            <div id="result" style="margin-top:15px; text-align:center; font-weight:bold;"></div>
        </div>

        <!-- Raw Data Section (For Debugging) -->
        <div id="rawTextCard" class="card hidden">
            <h3>Raw Scan Data</h3>
            <textarea id="rawText" style="width:100%; height:100px;" readonly></textarea>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        // PWA Service Worker Registration
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js');
        }
    </script>
</body>
