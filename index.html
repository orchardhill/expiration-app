<!DOCTYPE html>
<html lang="en">
<head>
    <!-- MOVED TO THE VERY TOP TO PREVENT "NOT DEFINED" ERROR -->
    <script src="https://cloudflare.com"></script>
    
    <meta charset="UTF-8" />
    <title>Exp Tracker v1.0.4</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="manifest" href="manifest.json" />

    <style>
        body { margin: 0; font-family: -apple-system, sans-serif; background: #f4f6f8; color: #333; }
        .app-header { background: #3f6fb5; color: white; padding: 16px; font-weight: bold; text-align: center; }
        .container { padding: 16px; max-width: 500px; margin: 0 auto; }
        .card { background: white; border-radius: 8px; padding: 16px; margin-bottom: 16px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .primary-btn { background: #3f6fb5; color: white; padding: 14px; width: 100%; border: none; border-radius: 6px; font-weight: bold; margin-top: 10px; cursor: pointer; }
        .take-pic-btn { background: #2c3e50; }
        .hidden { display: none; }
        #ocrStatus { margin-top: 10px; font-size: 14px; color: #666; text-align: center; min-height: 20px; }
        .progress-container { width: 100%; height: 12px; background: #eee; border-radius: 10px; margin-top: 10px; overflow: hidden; }
        #ocrProgress { height: 100%; width: 0%; background: #4caf50; transition: width 0.3s; }
    </style>
</head>
<body>
    <div class="app-header">Expiration Inventory</div>
    <div class="container">
        <div class="card">
            <h3>📷 Capture Item</h3>
            <input type="file" id="photoInput" accept="image/*" capture="environment" style="display:none;" />
            <button type="button" class="primary-btn take-pic-btn" id="takePicBtn">📸 Take Picture</button>
            <button type="button" class="primary-btn" id="scanBtn">Run OCR Scan</button>
            <img id="imagePreview" style="width:100%; display:none; margin-top:10px; border-radius:6px;" />
            <div class="progress-container"><div id="ocrProgress" style="height: 100%; width: 0%; background: #4caf50;"></div></div>
            <div id="ocrStatus">Ready...</div>
        </div>

        <div id="confirmCard" class="card hidden">
            <h3>✅ Confirm Details</h3>
            <form id="itemForm">
                <label>Item Name</label><input type="text" id="itemName" style="width:100%; padding:10px; margin:5px 0;" required />
                <label>Expiration Date</label><input type="date" id="expirationDate" style="width:100%; padding:10px; margin:5px 0;" required />
                <button type="submit" class="primary-btn" style="background:#3c8f4f;">Save to Sheet</button>
            </form>
            <div id="result" style="margin-top:15px; text-align:center; font-weight:bold;"></div>
        </div>

        <div style="text-align:center; font-size:10px; color:#999; margin-top:20px;">
            Build Version: <span id="versionLabel">1.0.4</span>
        </div>
    </div>
    <script src="app.js?v=1.0.4"></script>
</body>
</html>
